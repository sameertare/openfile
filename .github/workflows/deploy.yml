name: Deploy PawnPrint to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Build with the base path set to the repo name so assets resolve under
      # https://<user>.github.io/<repo>/ . For a user/org page (repo named
      # <user>.github.io) or a custom domain, this still works because the repo
      # name equals the site root.
      - run: npx vite build --base=/${{ github.event.repository.name }}/
      - run: touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
